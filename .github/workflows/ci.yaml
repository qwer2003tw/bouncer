name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write
  issues: write   # labeler 需要

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install ruff
        run: pip install ruff==0.9.10

      - name: Run ruff
        run: ruff check src/ mcp_server/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install bandit
        run: pip install bandit==1.9.3
        
      - name: Run bandit
        run: bandit -r src/ deployer/notifier/ -ll --skip B101,B603,B310

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit -r src/requirements.txt || true  # informational only

  typos:
    name: Typos Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check typos
        uses: crate-ci/typos@master

  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Lint GitHub Actions
        uses: raven-actions/actionlint@v2

  pr-size:
    name: PR Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: 10
          s_max_size: 100
          m_max_size: 500
          l_max_size: 1000
          fail_if_xl: false

  cfn-lint:
    name: CloudFormation Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install cfn-lint
        run: pip install cfn-lint==1.44.0
        
      - name: Run cfn-lint
        run: cfn-lint template.yaml --non-zero-exit-code error

  docs-check:
    name: Docs Updated Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # 需要完整歷史來比較
      
      - name: Check if SKILL.md updated with code changes
        run: |
          # 取得這次 PR/push 改動的檔案
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            # push event: 比較前一個 commit
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi
          
          # 取得 commit message
          COMMIT_MSG=$(git log -1 --pretty=%B $HEAD)
          
          # 如果是 fix/docs/refactor/ci/test/chore 開頭（支援 fix: 和 fix(scope): 兩種格式），跳過文件檢查
          if echo "$COMMIT_MSG" | grep -qiE '^(fix|docs|refactor|ci|test|chore)(\([^)]*\))?:'; then
            echo "Commit type is fix/docs/refactor/ci/test/chore, skipping docs check"
            exit 0
          fi
          
          # 檢查是否有程式碼變動
          CODE_CHANGED=$(git diff --name-only $BASE $HEAD | grep -E '^src/app\.py|^bouncer_mcp\.py' || true)
          
          # 檢查是否有文件變動
          DOCS_CHANGED=$(git diff --name-only $BASE $HEAD | grep -E 'SKILL\.md|README\.md' || true)
          
          echo "Code changed: $CODE_CHANGED"
          echo "Docs changed: $DOCS_CHANGED"
          
          # 如果程式碼有改但文件沒改，強制失敗
          if [ -n "$CODE_CHANGED" ] && [ -z "$DOCS_CHANGED" ]; then
            echo "::error::程式碼有改動但 SKILL.md/README.md 沒有更新！新增/修改/刪除功能必須更新文件。"
            echo "::error::如果是 bug fix，請用 'fix:' 開頭的 commit message。"
            exit 1
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt
          pip install moto pytest pytest-cov==7.0.0 pytest-xdist==3.5.0 pytest-randomly==4.0.1
          
      - name: Check entities migration mock consistency
        run: |
          # If notifications.py has stale _send_message mocks in tests, CI catches it
          STALE=$(grep -rn "patch.*'_send_message'" tests/ 2>/dev/null | \
                  grep -v "_mock_entities_send\|autouse\|conftest\|#\|send_telegram_message_silent" | \
                  grep -v "test_notifications_main\|test_app" || true)
          if [ -n "$STALE" ]; then
            echo "❌ Stale _send_message mock patches found (should be send_message_with_entities):"
            echo "$STALE"
            exit 1
          fi
          echo "✅ Entities mock patterns consistent"

      - name: Check module refactor mock path consistency
        run: |
          python3 - <<'PYEOF2'
          import glob, sys
          stale = []
          for path in glob.glob("tests/**/*.py", recursive=True) + glob.glob("tests/*.py"):
              lines = open(path).readlines()
              for i, line in enumerate(lines):
                  if "patch('callbacks._boto3')" in line or 'patch("callbacks._boto3")' in line:
                      context = "".join(lines[i:i+4])
                      if "aws_clients.boto3" not in context:
                          stale.append(f"{path}:{i+1}: {line.rstrip()}")
          if stale:
              print("Found callbacks._boto3 patches without aws_clients.boto3 companion (within 3 lines):")
              for s in stale: print(s)
              sys.exit(1)
          print("Module refactor mock paths consistent")
          PYEOF2

      - name: Run pytest (src tests)
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=75 -n auto --dist=loadgroup

      - name: Run pytest (mcp_server tests)
        run: python3 -m pytest mcp_server/test_mcp_server.py -v --tb=short

      - name: Run pytest (deployer tests)  # Verified Sprint 27-005: deployer/ and mcp_server/ tests included
        run: cd deployer && python3 -m pytest tests/ -v --tb=short
        env:
          AWS_DEFAULT_REGION: us-east-1
          TABLE_NAME: test-table
          ACCOUNTS_TABLE_NAME: test-accounts
          REQUEST_SECRET: test-secret
          TELEGRAM_BOT_TOKEN: test-token
          APPROVED_CHAT_ID: '123456789'
          MCP_MAX_WAIT: '5'
          TRUSTED_ACCOUNT_IDS: '111111111111,222222222222,333333333333'
          DEFAULT_ACCOUNT_ID: '111111111111'
          UPLOAD_BUCKET: 'bouncer-uploads-test'

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: backend
          fail_ci_if_error: false
